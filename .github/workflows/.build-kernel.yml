name: Update Samsung Kernel

on: 
   workflow_dispatch:

jobs:
   build-kernel:
      runs-on: ubuntu-latest
      steps:
         - name: Free Up Disk Space
           uses: jlumbroso/free-disk-space@v1.3.1
           with: 
             tool-cache: true
             android: true
             dotnet: true
             haskell: true

         - name: Install The Dependencies
           run: |
            sudo apt-get update
            sudo apt-get install -y bc bison build-essential flex git curl libssl-dev libelf-dev python3
            mkdir -p ~/bin
            curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
            chmod a+x ~/bin/repo
            echo "$HOME/bin" >> $GITHUB_PATH

         - name: Git Configuration
           run: |
            git config --global user.email "awtismn@gmail.com"
            git config --global user.name "awtismn"

         - name: Download GKI From AOSP
           run: |
            mkdir android-kernel
            repo init -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6-2026-04 --depth=1
            repo sync -c -j$(nproc) --no-tags --no-clone-bundle

         - name: Clone Drivers From Samsung Repo
           run: |
             cd android-kernel
             git clone https://github.com/awtismn/gta9pwifi_kernel.git samsung-source
             echo "Repo Cloned, Now Cloning Modules..."
             mkdir -p modules/samsung-d
             cp -r samsung-source/techpack modules/samsung-d
             mkdir -p modules/samsung-d/drivers/soc
             cp -r samsung-source/drivers/soc/qcom modules/samsung-d
             mkdir -p modules/samsung-d/drivers/media/platform
             cp -r samsung-source/drivers/media/platform/msm modules/samsung-d/drivers/media/platform
             mkdir -p modules/samsung-d/drivers/net/
             cp -r samsung-source/drivers/net/wireless modules/samsung-d/drivers/net
             echo "Cloned Drivers, Removing Cloned Repo (To Save Space)"
             rm -rf samsung-source/
             echo "Done. Next Step"
         - name: Creating Neccessary KLeaf Files
           run: |
             cd android-kernel/modules/samsung-d
             echo "Creating BUILD files"
             cat <<EOF > BUILD
             load("//build/kernel/kleaf:kernel.bzl", "ddk_module")

             package(default_visibility = ["//visibility:public"])

             ddk_module(
              name = "qcom_audio_module",
              srcs = glob(["techpack/audio/**/*.c", "techpack/audio/**/*.h"]),
              out = "qcom_audio.ko",
              kernel_build = "//common:kernel_aarch64",
             )
             ddk_module(
              name = "qcom_camera_module",
              srcs = glob(["techpack/camera/**/*.c", "techpack/camera/**/*.h"]),
              out = "qcom_camera.ko",
              kernel_build = "//common:kernel_aarch64",
             )
             ddk_module(
              name = "qcom_dataipa_module",
              srcs = glob(["techpack/dataipa/**/*.c", "techpack/dataipa/**/*.h"]),
              out = "qcom_dataipa.ko",
              kernel_build = "//common:kernel_aarch64",
             )
             ddk_module(
              name = "qcom_display_module",
              srcs = glob(["techpack/display/**/*.c", "techpack/display/**/*.h"]),
              out = "qcom_display.ko",
              kernel_build = "//common:kernel_aarch64",
             )
             ddk_module(
              name = "qcom_video_module",
              srcs = glob(["techpack/video/**/*.c", "techpack/video/**/*.h"]),
              out = "qcom_video.ko",
              kernel_build = "//common:kernel_aarch64",
             )
             ddk_module(
              name = "qcom_stub_module",
              srcs = glob(["techpack/stub/**/*.c", "techpack/stub/**/*.h"]),
              out = "qcom_stub.ko",
              kernel_build = "//common:kernel_aarch64",
             )
             ddk_module(
              name = "qcom_wireless_module",
              srcs = glob([ "drivers/net/wireless/**/*.c", "drivers/net/wireless/**/*.h" ]),
              out = "qcom_wlan.ko",
              kernel_build = "//common:kernel_aarch64",
             )
             load("//build/kernel/kleaf:kernel.bzl", "kernel_images")

             kernel_images(
             name = "samsung_boot_images",
             build_vendor_boot = True,
             vendor_ramdisk_modules = [
             ":qcom_audio_module",
             ":qcom_camera_module",
             ":qcom_dataipa_module",
             ":qcom_display_module",
             ":qcom_video_module",
             ":qcom_stub_module",
             ":qcom_wireless_module",
             ],
             vendor_boot_modules_load = "vendor_boot.modules.load",
             kernel_build = "//common:kernel_aarch64",
             EOF
             if [ -f "BUILD.bazel" ]; then echo "Created BUILD.bazel"; fi
             cat <<EOF > vendor_boot.modules.load
             qcom_stub.ko
             qcom_audio.ko
             qcom_display.ko
             qcom_video.ko
             qcom_camera.ko
             qcom_dataipa.ko
             qcom_wlan.ko
             EOF
             if [ -f "vendor_boot.modules.load" ]; then echo "Created vendor_boot.modules.load"; fi
         - name: Setup Bazel
           uses: bazel-contrib/setup-bazel@main
           with:
             repository-cache: true
             disk-cache: ${{ github.workflow }}
             
         - name: Compile Images With KLeaf
           run: |
              if [ -f "~/.bashrc" ]; then echo "bazelrc exists"; fi
              echo "build:opt --copt=-O3" > ~/.bazelrc
              echo "build --strategy=Javac=worker" > ~/.bazelrc
              echo "build --strategy=DexBuilder=worker" > ~/.bazelrc
              echo "build --experimental_merged_skyframe_analysis_execution" > ~/.bazelrc
              cd android-kernel
              bazel build --local_cpu_resources=4 ./common:kernel_aarch64
              bazel build --local_cpu_resources=4 ./modules/samsung-d:all

         - name: Uploading Images
           uses: actions/upload-artifact@v4
           with:
             name: Samsung-Images
             path: |
               android-kernel/bazel-bin/modules/samsung-d/vendor_boot.img
               android-kernel/bazel-bin/common/kernel_aarch64/Image
